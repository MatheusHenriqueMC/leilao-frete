syntax = "proto3";

package freight;

// Serviço principal do leilão reverso de fretes
service FreightAuction {
  // Envia um lance (BID <valor>)
  rpc PlaceBid (BidRequest) returns (BidResponse);

  // Consulta estado atual (STATUS)
  rpc GetStatus (StatusRequest) returns (StatusResponse);

  // Inscreve-se para receber notificações de novos lances e encerramento
  rpc SubscribeUpdates (SubscriptionRequest) returns (stream AuctionUpdate);
}

// --- Mensagens ---

message BidRequest {
  float valor = 1;
  string transportadora_id = 2;
}

message BidResponse {
  bool aceito = 1;
  float menor_lance_atual = 2;
  string mensagem = 3;
}

message StatusRequest {}

message StatusResponse {
  float menor_lance = 1;
  string transportadora_lider = 2;
  int64 timestamp = 3;
  int32 total_lances = 4;
  bool encerrado = 5;
}

message SubscriptionRequest {
  string transportadora_id = 1;
}

message AuctionUpdate {
  float menor_lance = 1;
  string transportadora_lider = 2;
  int64 timestamp = 3;
  bool encerrado = 4;
  string mensagem = 5;
}
